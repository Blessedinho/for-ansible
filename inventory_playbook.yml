---

- name: Setup server (user + nginx)
  hosts: web
  become: yes

  tasks:

    - name: Create user 'engineer'
      user:
        name: engineer
        shell: /bin/bash
        state: present
        create_home: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start Nginx service
      service:
        name: nginx
        state: started

    - name: Enable Nginx on boot
      service:
        name: nginx
        enabled: yes
